<!DOCTYPE html>
<html>
<head>
  <title> ABCA - Coming Soon</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: 'Linik Sans', Arial, sans-serif !important;
      text-align: center;
      background-color: #a5683d !important;
	  height: 100vh;
	  max-height: 100vh;
	  padding: 3rem;
	  position: relative;
    }
	
	* {
	  color: #fff;
	}
	
	
	#coming-soon-txt {
		font-size: 15vw;
	}
	
	#replica-logo-parent {
		position: absolute;
		top: 0;
		right: 0;
	}
	
	#morada-parent {
		flex-flow: wrap;
		justify-content: space-evenly;
	}
	
	#replica-logo {
		width: 100px;
	}
	
	#abca-logo {
		width: 180px;
	}
	
	#loading-spinner {
		opacity: 0;
		transition: opacity 0.2s ease-out;
		position: absolute;
		display: flex;
		justify-content: center;
		align-items: center;
		width: 100%; 
		height: 100%; 
		top: 0;
		left: 0;
		z-index: 2;
		pointer-events: none;
		background-color: #a5683d;
	}

	#loading-spinner.show {
		opacity: 1;
	}
	
	@media (min-width: 769px) {
		#coming-soon-txt {
			font-size: 10em;
		}
		
	}
	
	@media (max-width: 768px) {
	
		body {
			padding: 1rem;
			height: 95vh;
		}
	
		#replica-logo {
			width: 60px;
			margin-bottom: 0.5rem;
		}
		
		#replica-logo-parent {
			position: relative;
			width: 100%;
			display: flex;
			justify-content: center;
			margin-bottom: 0.5rem;
		}
		
		#replica-matosinhos-morada,
		#replica-gaia-morada {
			font-size: .85rem;
		}
		
		#abca-logo {
			width: 160px;
		}
		
		#coming-soon-txt {
			font-size: 4.5rem;
		}
	}
	
	@media (max-width: 480px) {
		#replica-matosinhos-morada {
			margin-bottom: 1rem;
		}
	}
	
  </style>

  <link href="https://fonts.cdnfonts.com/css/linik-sans" rel="stylesheet">                
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>

<body>
	<div id="loading-spinner" class="show">
		<div class="spinner-border text-light" role="status">
		  <span class="sr-only"></span>
		</div>
	</div>

	<div class="d-flex w-100 h-100" style="align-items: space-evenly; flex-flow: column; justify-content: center; position: relative;">
	
		<div id="replica-logo-parent">
			<img id="replica-logo" src="images/Replica_Logo.jpg" title="Logo Réplica">
		</div>
	
		<div class="d-flex w-100 h-auto justify-content-center">
		  <img id="abca-logo" src="images/ABCA_Logo.jpg" title="Logo ABCA">
		</div>
		
		<div class="d-flex w-100 h-100 justify-content-center" style="flex-flow: column;">
		  <h1 id="coming-soon-txt" class="text-center m-0 mb-2">COMING SOON</h1>
		</div>

		<div id="morada-parent" class="d-flex w-100 h-auto p-2">
		  <span id="replica-matosinhos-morada" class="w-auto text-center">
			<b>RÉPLICA MATOSINHOS</b><br>
			Rua Roberto Ivens, 957<br>
			T: +351 926 730 370<br>
			E-mail: matosinhos@replica.pt<br>
			AMI 10830</span>

		   <span id="replica-gaia-morada" class="w-auto text-center">
			<b>RÉPLICA GAIA</b><br>	
			Avenida Beira Mar, 1623<br>
			T: +351 911 864 082<br>
			E-mail: gaia@replica.pt<br>
			AMI 10830</span>
		</div>
	</div>
	
	<script>
	
		document.addEventListener("DOMContentLoaded", function() {
			// remover spinner após 0.5 segundo
			setTimeout(() => {
				const spinner = document.getElementById("loading-spinner");
				if (spinner) {
					spinner.classList.remove("show");
				}
			}, 500);
		});
	</script>
	
</body>
</html>
