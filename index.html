<!DOCTYPE html>
<html>
<head>
  <title> ABCA - Coming Soon</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <style>
    body{
      font-family: 'Linik Sans', Arial, sans-serif !important;
      text-align: center;
      background-color: #a5683d !important;
	  height: 100vh;
	  padding: 3rem;
	  position: relative;
    }
	
	* {
	  color: #fff;
	}
	
    h1{
      font-size:48px;
    }
    p{
      font-size:20px;
      color:#555;
    }
	
	#coming-soon-txt {
		font-size: 20vw;
	}
	
	#replica-logo {
		position: absolute;
		top: 0;
		right: 0;
	}
	
	#loading-spinner {
		opacity: 0;
		transition: opacity 0.2s ease-out;
		position: absolute;
		display: flex;
		justify-content: center;
		align-items: center;
		width: 100%; 
		height: 100%; 
		top: 0;
		left: 0;
		z-index: 2;
		background-color: #a5683d;
	}

	#loading-spinner.show {
		opacity: 1;
	}
	
	@media (min-width: 576px) {
		#coming-soon-txt {
			font-size: calc(100vh - 48rem);
		}
	}


  </style>

  <link href="https://fonts.cdnfonts.com/css/linik-sans" rel="stylesheet">                
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>

<body>
	<div id="loading-spinner" class="show">
		<div class="spinner-border text-light" role="status">
		  <span class="sr-only"></span>
		</div>
	</div>

	<div class="d-flex w-100 h-100" style="align-items: space-evenly; flex-flow: column; justify-content: center; position: relative;">
		<div class="d-flex w-100 h-auto justify-content-center">
		  <img src="images/ABCA_Logo.jpg" title="Logo ABCA" style="height: 60px;">
		</div>

		<div class="d-flex w-100 h-100 justify-content-center" style="flex-flow: column;">
		  <h1 id="coming-soon-txt" class="text-center m-0 mb-2">COMING SOON</h1>
		  <img id="replica-logo" src="images/Replica_Logo.jpg" title="Logo Réplica" style="width: 120px;">
		</div>

		<div class="d-flex w-100 h-auto p-2" style="flex-flow: wrap; justify-content: space-evenly">
		  <span class="w-auto text-center mb-5 mb-sm-0">
			<b>RÉPLICA MATOSINHOS</b><br>
			Rua Roberto Ivens, 957<br>
			T: +351 926 730 370<br>
			E-mail: matosinhos@replica.pt<br>
			AMI 10830</span>

		   <span class="w-auto text-center">
			<b>RÉPLICA GAIA</b><br>
			Avenida Beira Mar, 1623<br>
			T: +351 911 864 082<br>
			E-mail: gaia@replica.pt<br>
			AMI 10830</span>
		</div>
	</div>
	
	<script>
	
		document.addEventListener("DOMContentLoaded", function() {
			// remover spinner após 0.5 segundo
			setTimeout(() => {
				const spinner = document.getElementById("loading-spinner");
				if (spinner) {
					spinner.classList.remove("show");
				}
			}, 500);
		});
	</script>
	
</body>
</html>
